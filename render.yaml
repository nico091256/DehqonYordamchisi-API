services:
  - type: web
    name: dehqon-yordamchisi-api
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm run prisma:deploy && npm run start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
